[package]
name = "agri-stream"
version = "0.1.0"
edition = "2021"
description = "a web portal that allows NGOs to pre-verify these women farmers and instantly disburse USDC directly to their digital wallets the moment a disaster is declared, utilizing a Soroban smart contract that securely escrows funds and guarantees immediate, transparent payouts without middleman delays."
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
soroban-sdk = "22.0.0"

[dev-dependencies]
soroban-sdk = { version = "22.0.0", features = ["testutils"] }

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true

[profile.release-with-logs]
inherits = "release"
debug-assertions = true